<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CTBoard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        /* Custom scrollbar for a sleek look */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #111827; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #4b5563; }
    </style>
</head>
<body class="bg-gray-950 text-gray-200 h-screen flex overflow-hidden">

    <!-- Sidebar Navigation -->
    <aside class="w-64 bg-gray-900 border-r border-gray-800 flex flex-col hidden md:flex">
        <div class="p-5 border-b border-gray-800 flex items-center space-x-3">
            <div class="w-8 h-8 bg-orange-600 rounded-md flex items-center justify-center font-bold text-white shadow-lg shadow-orange-600/30">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z"></path></svg>
            </div>
            <h1 class="text-xl font-bold tracking-wide text-white">CTBoard</h1>
        </div>
        
        <div class="p-4 flex-grow overflow-y-auto">
            <h3 class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3">Latest Scalars</h3>
            <ul id="sidebar-scalars" class="space-y-2">
                <!-- Dynamically populated tags -->
                <li class="text-sm text-gray-400 italic">Waiting for data...</li>
            </ul>
        </div>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-grow flex flex-col h-full overflow-hidden">
        
        <!-- Top Toolbar -->
        <header class="bg-gray-900/50 backdrop-blur border-b border-gray-800 p-4 flex justify-between items-center z-10">
            <div class="flex items-center space-x-6">
                <h2 class="text-lg font-medium text-white">Scalars</h2>
                
                <!-- TensorBoard Smoothing Slider -->
                <div class="flex items-center space-x-2 bg-gray-800 px-3 py-1.5 rounded-lg border border-gray-700">
                    <label class="text-sm text-gray-400">Smoothing</label>
                    <input type="range" id="smoothingSlider" min="0" max="0.999" step="0.001" value="0.6" class="w-24 accent-orange-500">
                    <span id="smoothingValue" class="text-sm text-gray-300 w-8 text-right">0.6</span>
                </div>
            </div>

            <div class="flex items-center space-x-3">
                <div class="flex items-center space-x-2 text-sm text-gray-400">
                    <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                    <span>Live</span>
                </div>
            </div>
        </header>

        <!-- Charts Grid -->
        <div class="flex-grow overflow-y-auto p-6">
            <div id="charts-container" class="grid grid-cols-1 xl:grid-cols-2 2xl:grid-cols-3 gap-6">
                <!-- Charts injected here -->
            </div>
        </div>
    </main>

    <script>
        // TensorBoard color palette for lines
        const colorPalette = ['#ff7043', '#29b6f6', '#66bb6a', '#ab47bc', '#ffa726', '#ec407a', '#26a69a', '#8d6e63'];
        
        // State
        let chartsData = {}; // Stores raw data for redrawing on smoothing changes
        let chartInstances = {}; // Chart.js objects
        let smoothingWeight = 0.6;
        
        // DOM Elements
        const container = document.getElementById('charts-container');
        const sidebar = document.getElementById('sidebar-scalars');
        const smoothingSlider = document.getElementById('smoothingSlider');
        const smoothingValueTxt = document.getElementById('smoothingValue');

        // Setup Smoothing listener
        smoothingSlider.addEventListener('input', (e) => {
            smoothingWeight = parseFloat(e.target.value);
            smoothingValueTxt.textContent = smoothingWeight.toFixed(2);
            redrawAllCharts(); // Recalculate and redraw when slider moves
        });

        // CTBoard Exponential Moving Average (EMA) algorithm
        function calculateEMA(data, weight) {
            if (!data || data.length === 0) return [];
            let smoothed = [];
            let last = data[0]; // Start EMA with the first value
            
            for (let i = 0; i < data.length; i++) {
                if (Number.isFinite(last) && weight > 0) {
                    last = (last * weight) + ((1 - weight) * data[i]);
                } else {
                    last = data[i];
                }
                smoothed.push(last);
            }
            return smoothed;
        }

        function createChartDOM(tag) {
            const wrapper = document.createElement('div');
            wrapper.className = "bg-gray-900 border border-gray-800 p-4 rounded-xl flex flex-col shadow-sm";
            wrapper.innerHTML = `
                <h3 class="text-sm font-semibold text-gray-200 mb-4">${tag}</h3>
                <div class="relative w-full h-64">
                    <canvas id="canvas-${tag.replace(/\//g, '-')}"></canvas>
                </div>
            `;
            container.appendChild(wrapper);
            return wrapper.querySelector('canvas');
        }

        function getChartColor(tag) {
            // Simple string hash to pick a consistent color from the palette
            let hash = 0;
            for (let i = 0; i < tag.length; i++) hash = tag.charCodeAt(i) + ((hash << 5) - hash);
            return colorPalette[Math.abs(hash) % colorPalette.length];
        }

        function initChart(tag, canvas) {
            Chart.defaults.color = '#6b7280';
            Chart.defaults.font.family = 'Inter';
            
            const color = getChartColor(tag);

            return new Chart(canvas.getContext('2d'), {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [
                        {
                            // Smoothed line (Bold)
                            label: tag + ' (Smoothed)',
                            data: [],
                            borderColor: color,
                            borderWidth: 2,
                            pointRadius: 0,
                            pointHoverRadius: 4,
                            tension: 0, 
                            order: 1
                        },
                        {
                            // Raw line (Faded behind)
                            label: tag + ' (Raw)',
                            data: [],
                            borderColor: color + '40', // 40 is hex for ~25% opacity
                            borderWidth: 1.5,
                            pointRadius: 0,
                            tension: 0,
                            order: 2
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: false, // Turn off for instant tensorboard-like updates
                    interaction: { mode: 'index', intersect: false },
                    plugins: { 
                        legend: { display: false },
                        tooltip: { 
                            backgroundColor: 'rgba(17, 24, 39, 0.9)',
                            titleColor: '#fff',
                            bodyColor: '#e5e7eb',
                            borderColor: '#374151',
                            borderWidth: 1
                        }
                    },
                    scales: { 
                        x: { grid: { color: '#1f2937' }, ticks: { maxTicksLimit: 10 } }, 
                        y: { grid: { color: '#1f2937' } } 
                    }
                }
            });
        }

        function redrawAllCharts() {
            Object.keys(chartsData).forEach(tag => {
                const rawData = chartsData[tag].values;
                const smoothedData = calculateEMA(rawData, smoothingWeight);
                
                chartInstances[tag].data.datasets[0].data = smoothedData;
                chartInstances[tag].update();
            });
        }

        function updateSidebar(latestStats) {
            sidebar.innerHTML = '';
            Object.entries(latestStats).forEach(([tag, value]) => {
                const li = document.createElement('li');
                li.className = "flex justify-between items-center text-sm p-2 bg-gray-800/50 rounded-lg border border-gray-700/50";
                li.innerHTML = `
                    <span class="text-gray-300 font-medium truncate pr-2">${tag}</span>
                    <span class="text-white font-mono bg-gray-950 px-2 py-1 rounded text-xs">${value.toPrecision(5)}</span>
                `;
                sidebar.appendChild(li);
            });
        }

        async function fetchMetrics() {
            try {
                const response = await fetch('/api/data');
                const data = await response.json();
                
                let dataUpdated = false;

                // Iterate over all tags received from Python
                Object.entries(data.metrics).forEach(([tag, history]) => {
                    // Check if chart exists, if not create it
                    if (!chartInstances[tag]) {
                        const canvas = createChartDOM(tag);
                        chartInstances[tag] = initChart(tag, canvas);
                        chartsData[tag] = { count: 0, values: [] };
                    }

                    // If new data arrived for this tag
                    if (history.length > chartsData[tag].count) {
                        dataUpdated = true;
                        chartsData[tag].count = history.length;
                        
                        const labels = history.map(d => d.step);
                        const rawValues = history.map(d => d.value);
                        
                        chartsData[tag].values = rawValues;
                        const smoothedValues = calculateEMA(rawValues, smoothingWeight);

                        // Update chart data arrays
                        chartInstances[tag].data.labels = labels;
                        chartInstances[tag].data.datasets[0].data = smoothedValues; // Bold
                        chartInstances[tag].data.datasets[1].data = rawValues;      // Faded raw

                        chartInstances[tag].update();
                    }
                });

                if (dataUpdated && data.latest) {
                    updateSidebar(data.latest);
                }

            } catch (err) {
                console.error("Failed to fetch API:", err);
            }
        }

        // Poll API every second
        setInterval(fetchMetrics, 1000);
        
    </script>
</body>
</html>
